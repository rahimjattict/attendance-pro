<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance System</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

input,button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

input{background:#334155;color:white;}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

#panel{display:none;}
</style>
</head>

<body>

<div class="box">
<h2>🔐 Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="panel">
  <h3>Welcome</h3>
  <button onclick="checkIn()">📍 Check In</button>
  <button onclick="checkOut()">🚪 Check Out</button>
  <button onclick="logout()">Logout</button>
</div>

<p id="msg"></p>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxxxHrUUSHx-JOORIAfzgabTtySGBRcwBdVs47Ba891Wi1jgfKkOBuy0Spl2cPizz-LUw/exec";

function login(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:username.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      localStorage.setItem("user",username.value);
      localStorage.setItem("role",data.role);

      panel.style.display="block";

      if(data.role==="admin"){
        window.location="admin.html";
      }
    } else {
      alert("❌ Invalid login");
    }
  });
}

function checkIn(){
  navigator.geolocation.getCurrentPosition(pos=>{
    fetch(URL,{
      method:"POST",
      body:JSON.stringify({
        action:"checkin",
        username:localStorage.getItem("user"),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      })
    })
    .then(res=>res.text())
    .then(msg=>document.getElementById("msg").innerText=msg);
  });
}

function checkOut(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"checkout",
      username:localStorage.getItem("user")
    })
  })
  .then(res=>res.text())
  .then(msg=>document.getElementById("msg").innerText=msg);
}

function logout(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
